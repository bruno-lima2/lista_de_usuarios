<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container_nome">
      <label for="nome" class="label">Nome</label>
      <input
        type="text"
        class="nome form-control"
        placeholder="Digite seu nome"
      />
    </div>
    <div class="container_email">
      <label for="email" class="label">Email</label>
      <input
        type="text"
        class="email form-control"
        placeholder="exemplo@dominio.com"
      />
    </div>
    <div class="container_celular">
      <label for="celular" class="label">Celular</label>
      <input
        type="text"
        class="celular form-control"
        placeholder="(00) 0 0000-0000"
      />
    </div>
    <button class="btn btn-primary adicionar">ADICIONAR</button>
    <div class="campos"></div>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
